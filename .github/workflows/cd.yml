name: CD - 发布到 PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  # ============ CI 检查 (复用 ci.yml) ============
  ci-check:
    name: CI 检查
    uses: ./.github/workflows/ci.yml

  # ============ 发布构建 ============
  build:
    name: 构建发布包
    runs-on: ubuntu-latest
    needs: [ci-check]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装 uv
        uses: astral-sh/setup-uv@v5

      - name: 同步依赖
        run: uv sync

      - name: 运行测试
        run: uv run pytest tests/unit/ -v --tb=short

      - name: 清理旧构建产物
        run: rm -rf dist/ build/ *.egg-info

      - name: 构建包
        run: uv build

      - name: 验证构建产物
        run: |
          ls -la dist/
          uv run twine check dist/*
          for f in dist/*; do
            echo "Checking $f"
            base=$(basename "$f")
            if ! echo "$base" | grep -q '^ptestx-'; then
              echo "ERROR: built package name does not start with 'ptestx': $base"
              exit 1
            fi
          done

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/
          retention-days: 5

  # ============ 发布到 PyPI ============
  publish-pypi:
    name: 发布到 PyPI
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/project/ptestx/
    permissions:
      id-token: write

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # ============ 创建 GitHub Release ============
  create-release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: 获取版本号
        id: get_version
        run: |
          VERSION=$(grep -oP '(?<=version = ")[^"]+' pyproject.toml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 准备 Release Notes
        id: release_notes
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          VERSION="${{ steps.get_version.outputs.version }}"
          NOTES_FILE=".github/release-notes/${TAG}.md"

          if [ -f "$NOTES_FILE" ]; then
            echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
            echo "使用仓库中的 release notes: $NOTES_FILE"
          else
            FALLBACK_FILE="$RUNNER_TEMP/release-notes-${VERSION}.md"
            cat > "$FALLBACK_FILE" <<EOF
          ## ptest ${TAG}

          本次版本通过手动触发 CD 工作流创建 Release。

          安装命令：
          \`\`\`bash
          pip install ptestx==${VERSION}
          \`\`\`
          EOF
            echo "path=$FALLBACK_FILE" >> "$GITHUB_OUTPUT"
            echo "未找到版本专用 release notes，已生成默认说明。"
          fi

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body_path: ${{ steps.release_notes.outputs.path }}
          files: dist/*
          draft: false
          prerelease: false
